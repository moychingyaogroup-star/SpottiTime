<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpottiTime - Employees</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/employees.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Sidebar (Standard) -->
        <aside class="sidebar" id="sidebar-container">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>SpottiTime</h1>
            </div>

            <div id="profile-button-container"></div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h3>PERSONAL</h3>
                    <div id="schedule-button-container"></div>
                    <div id="important-dates-button-container"></div>
                    <div id="categories-button-container"></div>
                    <div id="analytics-button-container"></div>
                </div>

                <div class="nav-section">
                    <h3>SOCIAL</h3>
                    <div id="story-button-container"></div>
                    <div id="friends-button-container"></div>
                    <div id="messages-button-container"></div>
                </div>

                <div class="nav-section">
                    <h3>WORK</h3>
                    <div id="business-button-container"></div>
                    <div id="employees-button-container"></div>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content employees-workspace">
            <header class="main-header" style="justify-content: flex-start; padding-left: 20px;">
                <div class="header-left">
                    <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h2 style="display: flex; align-items: center; gap: 8px;">Employees Tracking <i class="fas fa-users" style="color: var(--color-competitions);"></i></h2>
                </div>
            </header>

            <div class="employees-dashboard">
                <div class="tracker-card">
                    <div class="card-header">
                        <h3>Employee Roster & Financials</h3>
                        <button class="btn-add"><i class="fas fa-plus"></i> Add Employee</button>
                    </div>

                    <div class="table-container">
                        <table class="employees-table">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Hourly Rate ($)</th>
                                    <th>Work Hours (Mtd)</th>
                                    <th>Leave Hours (Mtd)</th>
                                    <th>Daily Cost</th>
                                    <th>Weekly Cost</th>
                                    <th>Monthly Cost</th>
                                    <th>Yearly Cost</th>
                                </tr>
                            </thead>
                            <tbody id="employees-table-body">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/components/ProfileButton.js"></script>
    <script src="js/components/ScheduleButton.js"></script>
    <script src="js/components/CategoriesButton.js"></script>
    <script src="js/components/ImportantDatesButton.js"></script>
    <script src="js/components/AnalyticsButton.js"></script>
    <script src="js/components/FriendsButton.js"></script>
    <script src="js/components/MessagesButton.js"></script>
    <script src="js/components/BusinessButton.js"></script>
    <script src="js/components/EmployeesButton.js"></script>
    <script src="js/employees-workspace.js"></script>
</body>
</html>
