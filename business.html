<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpottiTime - Business</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/business.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Sidebar (Standard) -->
        <aside class="sidebar" id="sidebar-container">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>SpottiTime</h1>
            </div>

            <div id="profile-button-container"></div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h3>PERSONAL</h3>
                    <div id="schedule-button-container"></div>
                    <div id="important-dates-button-container"></div>
                    <div id="categories-button-container"></div>
                    <div id="analytics-button-container"></div>
                </div>

                <div class="nav-section">
                    <h3>SOCIAL</h3>
                    <div id="story-button-container"></div>
                    <div id="friends-button-container"></div>
                    <div id="messages-button-container"></div>
                </div>

                <div class="nav-section">
                    <h3>WORK</h3>
                    <div id="business-button-container"></div>
                    <div id="employees-button-container"></div>
                </div>
            </nav>
        </aside>

        <!-- Secondary Employee Sidebar -->
        <aside class="employees-sidebar">
            <div class="employees-header">
                <h2>Employees <button class="btn-add-employee"><i class="fas fa-plus"></i></button></h2>
            </div>

            <div class="employee-list">
                <div class="employee-item" data-employee-id="alex">
                    <div class="employee-avatar" style="background-color: #ff9999;">A</div>
                    <div class="employee-info">
                        <div class="employee-name">Alex</div>
                        <div class="employee-role">boss</div>
                    </div>
                    <div class="employee-actions">
                        <button class="btn-time-off" data-type="-1h" title="-1 Hour">-1h</button>
                        <button class="btn-time-off" data-type="-1d" title="-1 Day">-1d</button>
                    </div>
                    <div class="employee-hours">0h</div>
                </div>

                <div class="employee-item" data-employee-id="jasmine">
                    <div class="employee-avatar" style="background-color: #4dff4d;">J</div>
                    <div class="employee-info">
                        <div class="employee-name">Jasmine</div>
                        <div class="employee-role">Staff</div>
                    </div>
                    <div class="employee-actions">
                        <button class="btn-time-off" data-type="-1h" title="-1 Hour">-1h</button>
                        <button class="btn-time-off" data-type="-1d" title="-1 Day">-1d</button>
                    </div>
                    <div class="employee-hours">0h</div>
                </div>

                <div class="employee-item" data-employee-id="john">
                    <div class="employee-avatar" style="background-color: #ffb84d;">J</div>
                    <div class="employee-info">
                        <div class="employee-name">John</div>
                        <div class="employee-role">Staff</div>
                    </div>
                    <div class="employee-actions">
                        <button class="btn-time-off" data-type="-1h" title="-1 Hour">-1h</button>
                        <button class="btn-time-off" data-type="-1d" title="-1 Day">-1d</button>
                    </div>
                    <div class="employee-hours">0h</div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content business-workspace">
            <header class="main-header">
                <div class="business-stats">
                    <div class="stat-box">
                        <span class="stat-value" id="total-shifts">0</span>
                        <span class="stat-label">Shifts</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="total-hours">0h</span>
                        <span class="stat-label">Hours</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="total-staff">3</span>
                        <span class="stat-label">Staff</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="total-conflicts">0</span>
                        <span class="stat-label">Conflicts</span>
                    </div>
                </div>

                <div class="header-controls">
                    <div class="date-navigator">
                        <button class="nav-arrow"><i class="fas fa-arrow-left"></i> Prev</button>
                        <span class="current-date-range">Apr 26 - May 2</span>
                        <button class="nav-arrow">Next <i class="fas fa-arrow-right"></i></button>
                    </div>

                    <!-- Top Right Calendar & Copy Button -->
                    <div class="calendar-widget">
                        <div class="small-calendar" id="mini-calendar">
                            <!-- Populated via JS -->
                        </div>
                        <button id="btn-copy-last-month" class="btn-copy" title="Copy Last Month Shifts">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </header>

            <div class="grid-container">
                <div class="grid-header">
                    <div class="time-column-header"></div>
                    <div class="employee-column-header">
                        <div class="employee-avatar" style="background-color: #ff9999; width:24px; height:24px; font-size:12px;">A</div>
                        <div class="employee-info-sm">
                            <div>Alex</div><div class="role-sm">boss</div>
                        </div>
                    </div>
                    <div class="employee-column-header">
                        <div class="employee-avatar" style="background-color: #4dff4d; width:24px; height:24px; font-size:12px;">J</div>
                        <div class="employee-info-sm">
                            <div>Jasmine</div><div class="role-sm">Staff</div>
                        </div>
                    </div>
                    <div class="employee-column-header">
                        <div class="employee-avatar" style="background-color: #ffb84d; width:24px; height:24px; font-size:12px;">J</div>
                        <div class="employee-info-sm">
                            <div>John</div><div class="role-sm">Staff</div>
                        </div>
                    </div>
                </div>

                <div class="grid-body" id="schedule-grid">
                    <!-- Rows generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/components/ProfileButton.js"></script>
    <script src="js/components/ScheduleButton.js"></script>
    <script src="js/components/CategoriesButton.js"></script>
    <script src="js/components/ImportantDatesButton.js"></script>
    <script src="js/components/AnalyticsButton.js"></script>
    <script src="js/components/StoryButton.js"></script>
    <script src="js/components/FriendsButton.js"></script>
    <script src="js/components/MessagesButton.js"></script>
    <script src="js/components/BusinessButton.js"></script>
    <script src="js/components/EmployeesButton.js"></script>
    <script src="js/business-workspace.js"></script>
</body>
</html>
